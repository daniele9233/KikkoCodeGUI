name: Release (Windows)

# Builds the kikkoCode Windows installer with the opencode sidecar bundled.
# Triggered by pushing a version tag (e.g. v0.1.0), manually via the Actions
# tab, or by pushing a commit whose message contains "[release]" (the opt-in
# used when tag pushes aren't available in the current environment).
on:
  push:
    tags: ["v*"]
    branches: ["main"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (e.g. v0.1.3)"
        required: true
        default: "v0.1.3"

permissions:
  contents: write

# Pin the bundled opencode engine. Keep this in sync with the pinned
# `@opencode-ai/sdk` version in package.json so the GUI and the engine speak
# the same API. Bump both together when upgrading the engine.
env:
  OPENCODE_VERSION: "1.17.13"

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    # On a branch push, only build when the commit opts in with "[release]" so
    # ordinary pushes don't kick off a full Windows build every time.
    if: >-
      github.ref_type == 'tag' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[release]')
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fetch the PINNED opencode engine and place it as the Tauri sidecar with
      # the target-triple suffix Tauri expects. Tries the pinned tag first
      # (v<ver> then <ver>) and only falls back to `latest` so a tag/asset-name
      # change upstream doesn't hard-break the build, while normally shipping the
      # version that matches the pinned SDK. Verify the asset name vs the current
      # opencode release naming when bumping OPENCODE_VERSION.
      - name: Fetch opencode sidecar
        shell: pwsh
        run: |
          $triple = "x86_64-pc-windows-msvc"
          $dest = "src-tauri/binaries/opencode-$triple.exe"
          $zip = "$env:RUNNER_TEMP/opencode.zip"
          $asset = "opencode-windows-x64.zip"
          $ver = $env:OPENCODE_VERSION
          $urls = @(
            "https://github.com/sst/opencode/releases/download/v$ver/$asset",
            "https://github.com/sst/opencode/releases/download/$ver/$asset",
            "https://github.com/sst/opencode/releases/latest/download/$asset"
          )
          $ok = $false
          foreach ($u in $urls) {
            try {
              Write-Host "Trying $u"
              Invoke-WebRequest -Uri $u -OutFile $zip -ErrorAction Stop
              $ok = $true; Write-Host "  downloaded"; break
            } catch { Write-Host "  not available" }
          }
          if (-not $ok) { throw "could not download opencode sidecar (pin v$ver or latest)" }
          Expand-Archive -Path $zip -DestinationPath "$env:RUNNER_TEMP/opencode" -Force
          $bin = Get-ChildItem -Path "$env:RUNNER_TEMP/opencode" -Recurse -Filter "opencode.exe" | Select-Object -First 1
          if (-not $bin) { throw "opencode.exe not found in the downloaded archive" }
          Copy-Item $bin.FullName $dest -Force
          Write-Host "Sidecar placed at $dest"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # On a tag push, github.ref_name is the tag (v*). On a manual
          # dispatch or a "[release]" branch push, use the input (or default
          # v0.1.0) so tauri-action creates a clean v* tag instead of the
          # branch name.
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.tag || 'v0.1.3' }}
          releaseName: "kikkoCode ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.tag || 'v0.1.3' }}"
          # Publish directly (not a draft) so the install.ps1 one-liner, which
          # reads /releases/latest, can find the installer with no manual
          # "Publish" click. A published release is created only when the build
          # succeeds, so a failed build never ships a broken release.
          releaseDraft: false
          prerelease: false
          # Merge the release-only overlay that adds the opencode sidecar
          # (externalBin) — kept out of the base config so `cargo check` / dev
          # don't require the (uncommitted) binary to be present.
          args: --target x86_64-pc-windows-msvc --config src-tauri/tauri.release.conf.json
